name: PatchBook
options:
  bundleIdPrefix: com.shimondeitel.patchbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  PatchBook:
    type: application
    platform: iOS
    sources:
      - path: PatchBook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.patchbook
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: PatchBook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PatchBookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PatchBookTests
      - path: PatchBook.storekit
    dependencies:
      - target: PatchBook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.patchbook.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PatchBookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PatchBookUITests
    dependencies:
      - target: PatchBook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.patchbook.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  PatchBook:
    build:
      targets:
        PatchBook: all
        PatchBookTests: [test]
        PatchBookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: PatchBook.storekit
    test:
      config: Debug
      storeKitConfiguration: PatchBook.storekit
      targets:
        - PatchBookTests
        - PatchBookUITests
    archive:
      config: Release
